<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascendia Hire | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0A0E17;
            --bg-2:      #131A2A;
            --bg-3:      #1B2436;
            --line:      #232C42;
            --line-soft: #1B2436;
            --text:      #E7ECF5;
            --text-2:    #A8B3C7;
            --text-mist: #6B7690;

            --cyan:      #00D4FF;
            --cyan-dark: #00A8CC;
            --cyan-bg:   rgba(0,212,255,0.13);
            --cyan-text: #4FE0FF;

            --blue:      #3B82F6;
            --blue-bg:   rgba(59,130,246,0.14);
            --blue-text: #7CA8FF;

            --green:     #10B981;
            --green-bg:  rgba(16,185,129,0.14);
            --green-text:#34D399;

            --amber:     #F59E0B;
            --amber-bg:  rgba(245,158,11,0.14);
            --amber-text:#FBBF24;

            --red:       #EF4444;
            --red-bg:    rgba(239,68,68,0.14);
            --red-text:  #F87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* ── SIDEBAR ── */
        #appSidebar {
            width: 232px;
            background: #070A11;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid var(--line);
            z-index: 50;
            transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
        }

        .sidebar-logo {
            padding: 1.35rem 1.25rem 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--line);
        }
        .sidebar-logo-icon {
            width: 32px; height: 32px;
            background: var(--cyan);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #041016;
            box-shadow: 0 0 18px rgba(0,212,255,0.45);
            flex-shrink: 0;
        }
        .sidebar-logo-text {
            font-family: 'Sora', sans-serif;
            font-size: 0.98rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.01em;
        }
        .sidebar-logo-text span { color: var(--cyan); }

        #sidebarNav {
            flex: 1;
            padding: 0.9rem 0.6rem;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #sidebarNav::-webkit-scrollbar { display: none; }

        .nav-section-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #465067;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.7rem 0.7rem 0.35rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .nav-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.58rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
            color: #7C879C;
            border: none;
            background: transparent;
            text-align: left;
        }
        .nav-btn i { width: 16px; text-align: center; flex-shrink: 0; font-size: 12px; }
        .nav-btn:hover { background: rgba(255,255,255,0.04); color: #D5D9E4; }
        .nav-btn.active {
            background: rgba(0,212,255,0.12);
            color: var(--cyan-text);
            font-weight: 700;
            border-left: 2px solid var(--cyan);
            padding-left: calc(0.75rem - 2px);
        }
        .nav-btn.active i { color: var(--cyan); }

        .sidebar-user {
            padding: 0.9rem 1rem;
            border-top: 1px solid var(--line);
        }
        .sidebar-user-info {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 0.7rem;
        }
        .sidebar-avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(0,212,255,0.14);
            border: 1px solid rgba(0,212,255,0.32);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            color: var(--cyan-text);
            font-size: 0.8rem;
            font-family: 'Sora', sans-serif;
            flex-shrink: 0;
        }
        .sidebar-user-name { font-size: 0.79rem; font-weight: 700; color: white; font-family:'Sora',sans-serif; }
        .sidebar-user-email { font-size: 0.66rem; color: #525C74; font-family:'JetBrains Mono',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
        #sidebarRole {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 5px;
            font-size: 0.62rem;
            font-weight: 700;
            margin-bottom: 0.55rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.74rem;
            color: #5B6478;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            padding: 0;
            transition: color 0.15s;
        }
        .logout-btn:hover { color: var(--red); }

        /* ── MOBILE OVERLAY ── */
        #sidebarOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 40;
        }
        #sidebarOverlay.open { display: block; }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            background: var(--bg);
        }

        #appHeader {
            height: 58px;
            background: var(--bg);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            padding: 0 1.75rem;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        #mobileMenuBtn {
            display: none;
            width: 36px; height: 36px;
            border: 1.5px solid var(--line);
            border-radius: 8px;
            background: var(--bg-2);
            color: var(--text-2);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        #mobileMenuBtn:hover { border-color: var(--cyan); color: var(--cyan); }

        #pageTitle {
            flex: 1;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        #headerBadge {
            padding: 0.22rem 0.7rem;
            border-radius: 6px;
            font-size: 0.68rem;
            font-weight: 700;
            flex-shrink: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        #mainView {
            flex: 1;
            overflow-y: auto;
            padding: 1.6rem 2.1rem;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            font-size: 0.83rem;
            font-weight: 600;
            box-shadow: 0 10px 34px rgba(0,0,0,0.5);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            max-width: 300px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            border: 1px solid var(--line);
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* ── CARDS & COMMON ── */
        .card {
            background: var(--bg-2);
            border-radius: 14px;
            padding: 1.4rem;
            border: 1px solid var(--line);
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            position: relative;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #2E3A54; }
        .section-title {
            font-family: 'Sora', sans-serif;
            font-size: 0.94rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-bottom: 1rem;
        }
        .tag {
            display: inline-block;
            padding: 0.18rem 0.6rem;
            border-radius: 6px;
            font-size: 0.66rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        /* input & btn */
        .input-field {
            width: 100%;
            padding: 0.68rem 1rem;
            border: 1.5px solid var(--line);
            border-radius: 9px;
            outline: none;
            transition: all 0.2s;
            background: var(--bg-3);
            font-size: 0.87rem;
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }
        .input-field:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.12); background: var(--bg-3); }
        .input-field::placeholder { color: #5B6478; }

        .btn {
            padding: 0.58rem 1.1rem;
            border-radius: 9px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .btn-indigo { background: var(--cyan); color: #041016; box-shadow: 0 2px 14px rgba(0,212,255,0.3); }
        .btn-indigo:hover { background: var(--cyan-dark); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.42); }
        .btn-slate  { background: var(--bg-3); color: var(--text); border: 1px solid var(--line); }
        .btn-slate:hover  { border-color: var(--cyan); color: var(--cyan-text); }
        .btn-red    { background: var(--red); color: white; }
        .btn-red:hover    { background: #C53030; }
        .btn-green  { background: var(--green); color: white; }
        .btn-sm-outline {
            padding: 0.38rem 0.75rem;
            border-radius: 7px;
            font-size: 0.71rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            border: 1.5px solid var(--line);
            background: transparent;
            color: var(--text-2);
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-sm-outline:hover { border-color: var(--cyan); color: var(--cyan-text); }

        /* live dot */
        .live-dot {
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.6s infinite;
            box-shadow: 0 0 8px rgba(16,185,129,0.7);
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(1.4); }
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            #appSidebar {
                position: fixed;
                top: 0; left: 0;
                height: 100vh;
                transform: translateX(-100%);
            }
            #appSidebar.open { transform: translateX(0); }
            #mobileMenuBtn { display: flex; }
            #mainView { padding: 1rem; }
            .card { padding: 1rem; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside id="appSidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-chart-line"></i></div>
        <span class="sidebar-logo-text">Ascendia <span>Hire</span></span>
    </div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="sidebar-user-info">
            <div class="sidebar-avatar" id="sidebarAvatar">?</div>
            <div>
                <div class="sidebar-user-name" id="sidebarName"></div>
                <div class="sidebar-user-email" id="sidebarEmail"></div>
            </div>
        </div>
        <span id="sidebarRole"></span>
        <br>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</aside>

<!-- MAIN -->
<main>
    <header id="appHeader">
        <button id="mobileMenuBtn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <span id="pageTitle"></span>
        <span id="headerBadge"></span>
    </header>
    <div id="mainView"></div>
</main>

<div id="toast"></div>
<script src="JS/dashboard.js"></script>
</body>
</html>
