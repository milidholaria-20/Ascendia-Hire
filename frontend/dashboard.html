<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascendia Hire | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0a0a14;
            --ink2: #111827;
            --surface: #ffffff;
            --sidebar-bg: #0e0e1f;
            --sidebar-border: rgba(255,255,255,0.06);
            --accent: #4f46e5;
            --accent-light: #818cf8;
            --accent2: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --warn: #f59e0b;
            --muted: #64748b;
            --border: #e8eaf0;
            --card-bg: #ffffff;
            --page-bg: #f4f6fb;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--page-bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        #appSidebar {
            width: 230px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid var(--sidebar-border);
            z-index: 50;
            transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
        }

        .sidebar-logo {
            padding: 1.25rem 1.25rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .sidebar-logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: white;
            box-shadow: 0 3px 12px rgba(79,70,229,0.45);
            flex-shrink: 0;
        }
        .sidebar-logo-text {
            font-size: 1rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.02em;
        }
        .sidebar-logo-text span { color: #818cf8; }

        #sidebarNav {
            flex: 1;
            padding: 0.75rem 0.6rem;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #sidebarNav::-webkit-scrollbar { display: none; }

        .nav-section-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.6rem 0.7rem 0.3rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .nav-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.75rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.83rem;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            transition: all 0.15s;
            color: #64748b;
            border: none;
            background: transparent;
            text-align: left;
        }
        .nav-btn i { width: 18px; text-align: center; flex-shrink: 0; font-size: 13px; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: #c7d2fe; }
        .nav-btn.active {
            background: linear-gradient(135deg, rgba(79,70,229,0.25), rgba(124,58,237,0.15));
            color: #a5b4fc;
            font-weight: 700;
            border: 1px solid rgba(129,140,248,0.2);
        }
        .nav-btn.active i { color: #818cf8; }

        .sidebar-user {
            padding: 0.85rem 1rem;
            border-top: 1px solid var(--sidebar-border);
        }
        .sidebar-user-info {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 0.65rem;
        }
        .sidebar-avatar {
            width: 34px; height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(79,70,229,0.3), rgba(124,58,237,0.3));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800;
            color: #a5b4fc;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .sidebar-user-name { font-size: 0.8rem; font-weight: 700; color: white; }
        .sidebar-user-email { font-size: 0.68rem; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
        #sidebarRole {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            padding: 0;
            transition: color 0.15s;
        }
        .logout-btn:hover { color: #fca5a5; }

        /* ── MOBILE OVERLAY ── */
        #sidebarOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 40;
        }
        #sidebarOverlay.open { display: block; }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        #appHeader {
            height: 56px;
            background: white;
            border-bottom: 1px solid #eef0f5;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 0.75rem;
            flex-shrink: 0;
            box-shadow: 0 1px 0 #eef0f5;
        }

        #mobileMenuBtn {
            display: none;
            width: 36px; height: 36px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: #64748b;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        #mobileMenuBtn:hover { border-color: #818cf8; color: #4f46e5; }

        #pageTitle {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.01em;
        }

        #headerBadge {
            padding: 0.2rem 0.7rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        #mainView {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 14px;
            font-size: 0.83rem;
            font-weight: 600;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            max-width: 300px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* ── CARDS & COMMON ── */
        .card {
            background: white;
            border-radius: 18px;
            padding: 1.4rem;
            border: 1px solid #eef0f5;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.01em;
            margin-bottom: 1rem;
        }
        .tag {
            display: inline-block;
            padding: 0.18rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.68rem;
            font-weight: 700;
        }

        /* input & btn */
        .input-field {
            width: 100%;
            padding: 0.68rem 1rem;
            border: 1.5px solid #e8eaf0;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
            font-size: 0.87rem;
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
        }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: white; }
        .input-field::placeholder { color: #b0b8c8; }

        .btn {
            padding: 0.58rem 1.1rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            font-family: 'Outfit', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .btn-indigo { background: linear-gradient(135deg, #4f46e5, #6d28d9); color: white; box-shadow: 0 2px 10px rgba(79,70,229,0.25); }
        .btn-indigo:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,70,229,0.35); }
        .btn-slate  { background: #0f172a; color: white; }
        .btn-slate:hover  { background: #4f46e5; }
        .btn-red    { background: #ef4444; color: white; }
        .btn-red:hover    { background: #b91c1c; }
        .btn-green  { background: #059669; color: white; }
        .btn-sm-outline {
            padding: 0.38rem 0.75rem;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            border: 1.5px solid #e8eaf0;
            background: white;
            color: #475569;
            font-family: 'Outfit', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-sm-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* live dot */
        .live-dot {
            width: 7px; height: 7px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.6s infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(1.4); }
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            #appSidebar {
                position: fixed;
                top: 0; left: 0;
                height: 100vh;
                transform: translateX(-100%);
            }
            #appSidebar.open { transform: translateX(0); }
            #mobileMenuBtn { display: flex; }
            #mainView { padding: 1rem; }
            .card { padding: 1rem; border-radius: 14px; }
        }
    </style>
</head>
<body>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside id="appSidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-chart-line"></i></div>
        <span class="sidebar-logo-text">Ascendia <span>Hire</span></span>
    </div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="sidebar-user-info">
            <div class="sidebar-avatar" id="sidebarAvatar">?</div>
            <div>
                <div class="sidebar-user-name" id="sidebarName"></div>
                <div class="sidebar-user-email" id="sidebarEmail"></div>
            </div>
        </div>
        <span id="sidebarRole"></span>
        <br>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</aside>

<!-- MAIN -->
<main>
    <header id="appHeader">
        <button id="mobileMenuBtn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <span id="pageTitle"></span>
        <span id="headerBadge"></span>
    </header>
    <div id="mainView"></div>
</main>

<div id="toast"></div>
<script src="JS/dashboard.js"></script>
</body>
</html>
